<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - THE AZRO STYLES</title>
    <link rel="stylesheet" href="aboutus-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Belgrano&family=Lugrasimo&display=swap" rel="stylesheet">
</head>
<body>
    <div class="about-us-page">
        <!-- Left side background image -->
        <div class="background-image">
            <img src="Images/aboutusleft.png" alt="Store interior">
        </div>

        <!-- Logo -->
        <div class="logo">
            <img src="Images/logo azro.png" alt="Logo">
        </div>

        <!-- Back to Home Button -->
        <div class="back-button" id="backButton">
            <div class="arrow-icon">
                <svg width="40" height="40" viewBox="0 0 43.3333 43.3333" fill="none">
                    <path d="M27.0833 10.8333L13.9167 24L27.0833 37.1667" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <p>Back to Home</p>
        </div>

        <!-- Brand Name -->
        <p class="brand-name">THE AZRO STYLES</p>

        <!-- About Us Heading -->
        <p class="about-heading">About Us</p>

        <!-- Content Box -->
        <div class="content-box"></div>

        <!-- Social Media Icons -->
        <div class="social-instagram">
            <img src="Images/Instagram.png" alt="Instagram">
        </div>
        <div class="social-twitter">
            <img src="Images/Twitter Circled.png" alt="Twitter">
        </div>
        <div class="social-facebook">
            <img src="Images/Facebook logo.png" alt="Facebook">
        </div>
    </div>
    <script src="about.js"></script>
</body>
</html>
