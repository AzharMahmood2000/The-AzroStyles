<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Azro Styles - Login</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lugrasimo&family=Podkova:wght@400;700&family=Inter:wght@400;500&family=Poppins:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <img src="Images/login left panel.png" alt="login-left-panel">
        <div class="left-panel"></div>

        <!-- Right Panel: Login Form -->
        <div class="right-panel">
            <div class="login-card">
                <header>
                    <h1 class="main-heading">THE AZRO STYLES</h1>
                    <p class="sub-heading">Access your private collections</p>
                </header>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter Your Username here" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter Your Password here" required>
                    </div>

                    <div class="options-row">
                        <label class="checkbox-container">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                    
                    <a href="#" class="forgot-link">Forgot Password?</a>

                    <div class="social-login">
                        <button type="button" class="social-btn">
                            <img src="Images/google.png" alt="Google" style="width:18px; height:18px;">
                            Sign in with Google
                        </button>
                        <button type="button" class="social-btn">
                             <img src="Images/Apple.png" alt="Apple" style="width:24px; height: 24px;">
                            Sign in with Apple
                        </button>
                    </div>

                    <p class="signup-prompt">Don't have account? <a href="#">Sign up</a></p>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
